name: Docker Hub Publish

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: scottlewis193/f1-league:latest
          build-args: |
            PUBLIC_PB_URL=https://pb-f1-league.hades.ws
            PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.PUBLIC_VAPID_PUBLIC_KEY || 'BHKr-fL3KUrgDknbDc0-N3vbrZtMOwf3to5yM0NLbmsLMyil3EcmdPzRA-ZfP83YxDPgU5XcAiMHTpk7LKQ26Uo' }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY || '' }}
            SEASON_WALLET_ID=${{ secrets.SEASON_WALLET_ID || '6ktan6n8znpo4zr' }}
            PREDICTION_ENTRY_FEE=${{ secrets.PREDICTION_ENTRY_FEE || '5' }}
            PREDICTION_WALLET_ID=${{ secrets.PREDICTION_WALLET_ID || 's3xplu2rtlb8o0d' }}
